# OIR - openinternetresearch.com
# Production nginx server block for yz-webserver (/etc/nginx/conf.d/oir.conf)
# Sync target on host: /home/ubuntu/yz.network/nginx-oir.conf

server {
    listen 443 ssl;
    http2 on;
    server_name openinternetresearch.com www.openinternetresearch.com;

    ssl_certificate /etc/letsencrypt/live/openinternetresearch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openinternetresearch.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/oir;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html $uri.html =404;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Decap CMS OAuth proxy (GitHub auth for /admin/)
    # OAuth container on host — port 8110 (8090 used by yz-dht-node-5)
    location /api/auth/ {
        proxy_pass http://host.docker.internal:8110/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook endpoint (reverse proxy to host)
    location /webhook/ {
        proxy_pass http://host.docker.internal:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
