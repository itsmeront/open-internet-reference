# OIR - openinternetresearch.com
# Production nginx server block for yz-webserver (/etc/nginx/conf.d/oir.conf)
# Sync target on host: /home/ubuntu/yz.network/nginx-oir.conf

server {
    listen 443 ssl;
    http2 on;
    server_name openinternetresearch.com www.openinternetresearch.com;

    ssl_certificate /etc/letsencrypt/live/openinternetresearch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openinternetresearch.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/oir;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html $uri.html =404;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Decap CMS loads relative assets from /admin/ — require trailing slash
    location = /admin {
        return 301 /admin/;
    }

    # Decap CMS requires config.yml as text/yaml (not application/octet-stream)
    location = /admin/config.yml {
        types { }
        default_type text/yaml;
        charset utf-8;
    }

    # Decap CMS OAuth proxy (GitHub auth for /admin/)
    # OAuth container on yznetwork_yz-network as oir-oauth:8110
    location = /api/auth {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $oauth_upstream oir-oauth:8110;
        proxy_pass http://$oauth_upstream/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/callback {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $oauth_upstream oir-oauth:8110;
        proxy_pass http://$oauth_upstream/callback$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

# Webhook endpoint (reverse proxy to host systemd oir-webhook :9000)
# Requires WEBHOOK_HOST=0.0.0.0 and iptables rules for Docker bridge → :9000
# See deploy/README.md § Auto-Deploy via GitHub Webhook
    location /webhook/ {
        proxy_pass http://host.docker.internal:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
