# OIR nginx configuration
# Copy to /etc/nginx/sites-available/oir and symlink to sites-enabled
# Replace YOUR_DOMAIN with your actual domain name

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL (managed by certbot — these paths are updated automatically)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Site root — MkDocs generated site
    root /opt/oir/site;
    index index.html;

    # Main site
    location / {
        try_files $uri $uri/ $uri/index.html $uri.html =404;
    }

    # Decap CMS admin panel
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Decap CMS OAuth proxy (GitHub auth for /admin/)
    # OAuth container runs on the Docker host — see .github/DECAP_CMS_OAUTH.md
    # Port 8110 on boostrap-server (8090 is used by yz-dht-node-5)
    location /api/auth/ {
        proxy_pass http://host.docker.internal:8110/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GitHub webhook endpoint (reverse proxy to webhook handler)
    location /webhook/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webhook payloads can be large
        client_max_body_size 10m;
    }

    # MCP server (DO NOT enable until auth + rate limits are implemented)
    # Use a dedicated path — /api/auth/ is reserved for Decap CMS OAuth.
    # location /mcp/ {
    #     proxy_pass http://127.0.0.1:8080/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 404 /404.html;
}
