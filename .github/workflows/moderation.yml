name: Moderation & Labeling

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  label-and-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect AI-generated contributions
        id: ai-detect
        run: |
          # Check commit authors for known AI patterns
          AI_AUTHORS="OIR-AI|ai@oir|github-actions|dependabot|renovate|kiro"
          AI_DETECTED="false"

          # Get commits in this PR
          COMMITS=$(git log --format='%an <%ae>' origin/${{ github.base_ref }}..HEAD 2>/dev/null || echo "")

          if echo "$COMMITS" | grep -iE "$AI_AUTHORS"; then
            AI_DETECTED="true"
          fi

          # Check for AI markers in commit messages
          MESSAGES=$(git log --format='%s %b' origin/${{ github.base_ref }}..HEAD 2>/dev/null || echo "")
          if echo "$MESSAGES" | grep -iE "\[ai-generated\]|\[ai\]|generated by ai|ai-assisted"; then
            AI_DETECTED="true"
          fi

          echo "ai_detected=$AI_DETECTED" >> "$GITHUB_OUTPUT"

      - name: Classify content areas
        id: classify
        run: |
          # Determine which content areas are touched
          FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD 2>/dev/null || echo "")

          AREAS=""
          echo "$FILES" | grep -q "^knowledge/legal/" && AREAS="${AREAS}legal,"
          echo "$FILES" | grep -q "^knowledge/organizations/" && AREAS="${AREAS}organizations,"
          echo "$FILES" | grep -q "^knowledge/people/" && AREAS="${AREAS}people,"
          echo "$FILES" | grep -q "^knowledge/technical/" && AREAS="${AREAS}technical,"
          echo "$FILES" | grep -q "^bibliography/" && AREAS="${AREAS}bibliography,"
          echo "$FILES" | grep -q "^contacts/" && AREAS="${AREAS}contacts,"
          echo "$FILES" | grep -q "^TAXONOMY\|^schemas/" && AREAS="${AREAS}taxonomy,"
          echo "$FILES" | grep -q "^tools/\|^\.github/\|^deploy/\|^oir_mcp/" && AREAS="${AREAS}infrastructure,"
          echo "$FILES" | grep -q "^website/" && AREAS="${AREAS}website,"
          echo "$FILES" | grep -q "^intake/" && AREAS="${AREAS}intake,"

          # Remove trailing comma
          AREAS="${AREAS%,}"
          echo "areas=$AREAS" >> "$GITHUB_OUTPUT"

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['moderation/pending', 'needs-review'];

            // AI detection
            const aiDetected = '${{ steps.ai-detect.outputs.ai_detected }}' === 'true';
            if (aiDetected) {
              labels.push('ai-generated');
            }

            // Content area labels
            const areas = '${{ steps.classify.outputs.areas }}'.split(',').filter(Boolean);
            for (const area of areas) {
              labels.push(`area/${area}`);
            }

            // Apply labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

            // If AI-generated, add a comment noting review requirement
            if (aiDetected) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '🤖 **AI-Generated Content Detected**\n\n' +
                  'This PR contains commits from an AI agent. Per editorial policy:\n' +
                  '- AI content starts as `draft` status — never directly `verified`\n' +
                  '- Human review is **required** before merge\n' +
                  '- Source references must be verifiable (not training data claims)\n\n' +
                  'See `CONTRIBUTING.md` for AI contribution guidelines.'
              });
            }

  stale-check:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Check for stale verification dates
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Check verification freshness
        run: |
          # Find files with last_verified dates older than 6 months
          python -c "
          import os, yaml, sys
          from datetime import datetime, timedelta
          from pathlib import Path

          stale_threshold = datetime.now() - timedelta(days=180)
          stale_files = []

          for pattern in ['knowledge/**/*.md', 'bibliography/**/*.md']:
              for f in Path('.').glob(pattern):
                  try:
                      content = f.read_text()
                      if content.startswith('---'):
                          end = content.index('---', 3)
                          front = yaml.safe_load(content[3:end])
                          if front and front.get('last_verified'):
                              lv = front['last_verified']
                              if isinstance(lv, str):
                                  try:
                                      dt = datetime.fromisoformat(lv)
                                      if dt < stale_threshold:
                                          stale_files.append(str(f))
                                  except ValueError:
                                      pass
                  except Exception:
                      pass

          if stale_files:
              print(f'::warning::Found {len(stale_files)} files with stale verification dates (>6 months)')
              for sf in stale_files[:10]:
                  print(f'  - {sf}')
          "
