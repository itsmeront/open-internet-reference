name: Validate

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install -e '.[docs]'

      - name: Validate metadata
        run: python tools/validate_metadata.py

      - name: Generate indexes
        run: python tools/generate_indexes.py

      - name: Generate moderation and taxonomy reports
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/moderation_queue.py
          python tools/taxonomy_audit.py

      - name: Render brand assets
        run: python tools/render_brand_assets.py

      - name: Validate local Markdown links
        run: python tools/validate_links.py

      - name: Build MkDocs site
        run: mkdocs build --strict
