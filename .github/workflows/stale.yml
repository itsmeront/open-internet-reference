name: Stale PR Management

on:
  schedule:
    # Run weekly on Mondays at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # PR settings
          days-before-pr-stale: 14
          days-before-pr-close: 30
          stale-pr-message: |
            ⏰ **This PR has been inactive for 14 days.**

            If you're still working on it, please push an update or leave a comment.
            Otherwise, it will be closed in 16 days.

            For questions about the review process, see `EDITORIAL_WORKFLOW.md`.
          stale-pr-label: "stale"
          exempt-pr-labels: "moderation/approved,in-progress"

          # Issue settings
          days-before-issue-stale: 30
          days-before-issue-close: 60
          stale-issue-message: |
            ⏰ **This issue has been inactive for 30 days.**

            If it's still relevant, please leave a comment.
            Otherwise, it will be closed in 30 days.
          stale-issue-label: "stale"
          exempt-issue-labels: "research-debt,pinned"
