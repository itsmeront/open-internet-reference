name: Generate Moderation Reports

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Required so the later git push step can authenticate.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install -e '.[docs]'

      - name: Generate moderation queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/moderation_queue.py

      - name: Generate taxonomy audit
        run: python tools/taxonomy_audit.py

      # main is branch-protected (PR-only). Push report updates to an automation
      # branch, then open or update a pull request.
      - name: Commit and push report updates
        id: push
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin automated/moderation-reports || true

          git add \
            website/generated/moderation.md \
            website/generated/taxonomy-audit.md \
            generated/moderation-queue.json \
            generated/taxonomy-audit.json

          if git diff --staged --quiet; then
            echo "No report changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -B automated/moderation-reports
          git commit -m "chore: update moderation and taxonomy reports [automated]"
          git push --force-with-lease origin automated/moderation-reports
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        id: open_pr
        if: steps.push.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$(gh pr list --head automated/moderation-reports --base main --state open --json number -q 'length')" != "0" ]; then
            echo "Open PR already exists for automated/moderation-reports."
            gh pr list --head automated/moderation-reports --base main --state open
            exit 0
          fi

          gh pr create \
            --base main \
            --head automated/moderation-reports \
            --title "chore: update moderation and taxonomy reports [automated]" \
            --body "Automated refresh of moderation queue and taxonomy audit reports. Safe to merge when CI passes."

      - name: Summarize when PR creation is blocked
        if: steps.push.outputs.changed == 'true' && steps.open_pr.outcome == 'failure'
        run: |
          {
            echo "## Report branch updated; open a PR manually"
            echo
            echo "Report files were pushed to \`automated/moderation-reports\`, but GitHub Actions could not open a pull request."
            echo
            echo "Open a PR from [\`automated/moderation-reports\`](https://github.com/${{ github.repository }}/compare/main...automated/moderation-reports?expand=1)."
          } >> "$GITHUB_STEP_SUMMARY"
