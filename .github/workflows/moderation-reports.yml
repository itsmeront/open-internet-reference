name: Generate Moderation Reports

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install -e '.[docs]'

      - name: Install GitHub CLI
        run: |
          # gh is pre-installed on GitHub Actions runners
          gh --version

      - name: Generate moderation queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/moderation_queue.py

      - name: Generate taxonomy audit
        run: python tools/taxonomy_audit.py

      # main is branch-protected (PR-only). Open/update an automation PR instead
      # of pushing directly — a direct git push fails with GH006 on protected main.
      - name: Create pull request if reports changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update moderation and taxonomy reports [automated]"
          title: "chore: update moderation and taxonomy reports [automated]"
          body: |
            Automated refresh of moderation queue and taxonomy audit reports.

            Safe to merge when CI passes. Timestamps update daily even when queue
            content is unchanged.
          branch: automated/moderation-reports
          labels: automation
          add-paths: |
            website/generated/moderation.md
            website/generated/taxonomy-audit.md
            generated/moderation-queue.json
            generated/taxonomy-audit.json
