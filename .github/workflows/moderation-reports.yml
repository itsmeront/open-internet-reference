name: Generate Moderation Reports

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: read

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install -e '.[docs]'

      - name: Install GitHub CLI
        run: |
          # gh is pre-installed on GitHub Actions runners
          gh --version

      - name: Generate moderation queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/moderation_queue.py

      - name: Generate taxonomy audit
        run: python tools/taxonomy_audit.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add website/generated/moderation.md
          git add website/generated/taxonomy-audit.md
          git add generated/moderation-queue.json
          git add generated/taxonomy-audit.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update moderation and taxonomy reports [automated]"
            git push
          fi
